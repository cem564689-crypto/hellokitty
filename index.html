<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Did You Miss Me?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #fffdfd 0%, #fff2f5 100%);
      overflow: hidden;
      color: #333;
      padding: 20px;
    }

    .floating-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      bottom: -40px;
      font-size: 22px;
      opacity: 0.25;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 0.15;
      }
      20% {
        opacity: 0.35;
      }
      to {
        transform: translateY(-120vh) scale(1.4);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      background: white;
      border-radius: 28px;
      padding: 28px 24px 30px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #f4f4f4;
      margin-bottom: 18px;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .card:hover .image-wrap img {
      transform: scale(1.02);
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      color: #222;
    }

    p {
      margin: 0 0 22px;
      color: #666;
      font-size: 18px;
    }

    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 120px;
      flex-wrap: nowrap;
    }

    button {
      border: none;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
    }

    #yesBtn {
      position: relative;
      z-index: 2;
      font-size: 26px;
      padding: 18px 34px;
      background: #ff5c8a;
      color: white;
      max-width: 100%;
      width: auto;
      word-break: break-word;
      flex-shrink: 0;
    }

    #yesBtn:hover {
      transform: scale(1.04);
    }

    #noBtn {
      position: relative;
      left: auto;
      top: auto;
      font-size: 18px;
      padding: 14px 22px;
      background: #f2f2f2;
      color: #444;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #noBtn:hover {
      background: #ebebeb;
    }

    .success {
      display: none;
      animation: popIn 0.5s ease;
    }

    .success.show {
      display: block;
    }

    .success h2 {
      margin: 14px 0 8px;
      font-size: 36px;
      color: #ff4f81;
    }

    .success p {
      font-size: 20px;
      margin-bottom: 0;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .confetti,
    .burst-heart {
      position: fixed;
      pointer-events: none;
      z-index: 5;
    }

    .confetti {
      width: 10px;
      height: 16px;
      top: -20px;
      animation: fall 2.7s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .burst-heart {
      font-size: 22px;
      left: 50%;
      top: 50%;
      animation: burst 1.2s ease-out forwards;
    }

    @keyframes burst {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.8);
      }
      to {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.8);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 18px 16px 24px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 16px;
      }

      #yesBtn {
        font-size: 22px;
        padding: 16px 28px;
      }

      #noBtn {
        font-size: 16px;
      }

      .buttons {
        gap: 10px;
        min-height: 110px;
      }
    }
  </style>
</head>
<body>
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="card" id="card">
    <div id="mainContent">
      <div class="image-wrap">
        <video id="mainImage" src="videos/video1.mp4" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;display:block;"></video>
      </div>
      <h1>Did you miss me?</h1>
      <p id="subtitle">Be honest...</p>

      <div class="buttons" id="buttonArea">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
      </div>
    </div>

    <div class="success" id="successScreen">
      <div class="image-wrap">
        <img
          src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=900&q=80"
          alt="Celebration fireworks"
        />
      </div>
      <h2>YAYYYY!!!</h2>
      <p>I knew you missed me 💖</p>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const subtitle = document.getElementById('subtitle');
    const successScreen = document.getElementById('successScreen');
    const mainContent = document.getElementById('mainContent');
    const floatingHearts = document.getElementById('floatingHearts');
    let mainImage = document.getElementById('mainImage');

    const noTexts = [
      'Are you sure?',
      'Really sure??',
      'Think carefully...',
      'This is a very important question 😌',
      'Last chance to change your mind',
      'You know the correct answer 👀',
      'Okay okay… just press YES already 😂'
    ];

    // 7 pictures in /pics folder
    const imageStates = [
      'pics/pic1.jpg',
      'pics/pic2.jpg',
      'pics/pic3.jpg',
      'pics/pic4.jpg',
      'pics/pic5.jpg',
      'pics/pic6.jpg',
      'pics/pic7.jpg'
    ];

    let noCount = 0;
    let yesScale = 1;
    let noScale = 1;

    function createFloatingHearts() {
      for (let i = 0; i < 18; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = '❤';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = 6 + Math.random() * 7 + 's';
        heart.style.animationDelay = Math.random() * 5 + 's';
        heart.style.fontSize = 14 + Math.random() * 20 + 'px';
        floatingHearts.appendChild(heart);
      }
    }

    function launchConfetti() {
      const pieces = ['#ff5c8a', '#ffd166', '#7bdff2', '#b8f2e6', '#cdb4db'];

      for (let i = 0; i < 90; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = pieces[Math.floor(Math.random() * pieces.length)];
        confetti.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
        confetti.style.animationDuration = 1.8 + Math.random() * 1.6 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3200);
      }

      for (let i = 0; i < 24; i++) {
        const burst = document.createElement('div');
        burst.className = 'burst-heart';
        burst.textContent = '💖';
        const angle = (Math.PI * 2 * i) / 24;
        const distance = 100 + Math.random() * 160;
        const x = Math.cos(angle) * distance + 'px';
        const y = Math.sin(angle) * distance + 'px';
        burst.style.setProperty('--x', x);
        burst.style.setProperty('--y', y);
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 1300);
      }
    }

    noBtn.addEventListener('click', () => {
      if (noCount >= 7) return;

      noCount++;

      yesScale += 0.18;
      yesBtn.style.transform = `scale(${yesScale})`;

      noScale -= 0.08;
      if (noScale < 0.45) noScale = 0.45;
      noBtn.style.transform = `scale(${noScale})`;

      subtitle.textContent = noTexts[Math.min(noCount - 1, noTexts.length - 1)];

      if (mainImage.tagName === 'VIDEO') {
        const img = document.createElement('img');
        img.id = 'mainImage';
        img.src = imageStates[0];
        img.alt = 'Cute romantic moment';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.style.display = 'block';
        mainImage.parentNode.replaceChild(img, mainImage);
        mainImage = img;
      } else {
        mainImage.src = imageStates[Math.min(noCount - 1, imageStates.length - 1)];
      }

      if (noCount === 7) {
        noBtn.style.display = 'none';
        subtitle.textContent = 'Only one answer left 💖';
        yesBtn.style.transform = 'scale(1)';
        yesBtn.style.width = '100%';
        yesBtn.style.minHeight = '220px';
        yesBtn.style.fontSize = '72px';
        yesBtn.style.padding = '28px 20px';
        yesBtn.textContent = 'YES';
      }
    });

    yesBtn.addEventListener('click', () => {
      mainContent.style.display = 'none';
      successScreen.classList.add('show');
      launchConfetti();
    });

    createFloatingHearts();
  </script>
</body>
</html>
